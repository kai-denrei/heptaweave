<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background:#f6f1e7; margin:0; padding:24px; font:12px ui-monospace,monospace; color:#161310; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; max-width:1100px; }
  .cell { display:flex; flex-direction:column; align-items:center; overflow:hidden; }
  .cell svg { display:block; }
  .label { margin-top:6px; color:#666; font-size:11px; }
  h2 { font:11px ui-monospace,monospace; color:#888; margin:24px 0 8px; }
</style>
</head>
<body>
<h2>numeralV2 (canonical) — internal size 150 (renders 240×240)</h2>
<div class="grid" id="v2Grid"></div>

<h2>numeralV2 — internal size 200 (renders 320×320)</h2>
<div class="grid" id="v2BigGrid"></div>

<script type="module">
  const { renderHeptapodNumeralV2 } = await import('../src/heptacipher/numeralV2.js');
  const samples = [0, 1234, 5555, 9999, 5318, 8008, 3210, 7777];
  for (const n of samples) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const svg = renderHeptapodNumeralV2({ number: n, size: 150, seed: 31337 });
    cell.appendChild(svg);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = String(n).padStart(4, '0');
    cell.appendChild(lbl);
    document.getElementById('v2Grid').appendChild(cell);
  }
  for (const n of samples) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const svg = renderHeptapodNumeralV2({ number: n, size: 200, seed: 31337 });
    cell.appendChild(svg);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = String(n).padStart(4, '0');
    cell.appendChild(lbl);
    document.getElementById('v2BigGrid').appendChild(cell);
  }
</script>
</body>
</html>
