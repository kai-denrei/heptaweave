<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background:#f6f1e7; margin:0; padding:24px; font:12px ui-monospace,monospace; color:#161310; }
  .row { display:flex; gap:24px; flex-wrap:wrap; }
  .cell { display:flex; flex-direction:column; align-items:center; }
  .cell svg { display:block; }
  .label { margin-top:6px; color:#666; font-size:11px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; max-width:1100px; }
</style>
</head>
<body>
<div class="grid" id="aGrid"></div>
<script type="module">
  const { renderChoiceA } = await import('../src/heptacipher/choiceA.js');
  const aGrid = document.getElementById('aGrid');
  // Sample numbers covering different digit patterns
  const samples = [0, 1234, 5555, 9999, 5318, 8008, 3210, 7777];
  for (const n of samples) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const svg = renderChoiceA({ number: n, size: 240, seed: 31337 });
    cell.appendChild(svg);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = String(n).padStart(4, '0');
    cell.appendChild(lbl);
    aGrid.appendChild(cell);
  }
</script>
</body>
</html>
