<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="40" fill="#f6f1e7"/>
  <g fill="#161310" transform="translate(128 128)">
    <!-- vertical stave -->
    <rect x="-3" y="-72" width="6" height="144" rx="2"/>
    <!-- four corner ticks: stylized cistercian feel without spelling a digit -->
    <rect x="3"  y="-72" width="36" height="6" rx="2"/>
    <rect x="-39" y="-72" width="36" height="6" rx="2"/>
    <rect x="3"  y="66"  width="36" height="6" rx="2"/>
    <rect x="-39" y="66"  width="36" height="6" rx="2"/>
  </g>
</svg>
